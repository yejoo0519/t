<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tank_calc.js — 체+방 계산기</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic+Coding:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1e1e1e;--sf:#252526;--sf2:#2d2d30;--bd:#3c3c3c;
  --text:#d4d4d4;--text2:#9aa0a6;
  --gold:#dcdcaa;--gold2:#e8d18a;      /* 함수명 계열 (강조/타이틀) */
  --dim:#6a9955;--dimmer:#5a5a5a;      /* 주석 계열 (보조 라벨) */
  --red:#f14c4c;--green:#b5cea8;--blue:#569cd6;
  --hpc:#b5cea8;--atc:#ce9178;--dfc:#9cdcfe; /* number / string / variable 색상 */
  --string:#ce9178;--keyword:#569cd6;--num:#b5cea8;
}
*::selection{background:rgba(38,79,120,.6)}
body{font-family:'Nanum Gothic Coding',monospace;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;
  background-image:linear-gradient(rgba(255,255,255,.015) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.015) 1px,transparent 1px);
  background-size:24px 24px;
}
.hd{display:flex;align-items:center;gap:10px;padding:10px 20px;background:var(--sf);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:100}
.hd-dots{display:flex;gap:6px;margin-right:4px}
.hd-dots span{width:10px;height:10px;border-radius:50%;background:var(--bd)}
.hd-icon{font-size:18px}
.hd-t{font-size:14px;font-weight:700;color:var(--gold)}
.hd-s{font-size:11px;color:var(--dim)}
.hd-s::before{content:'// '}
.ti{max-width:1000px;margin:0 auto;padding:20px 24px}
.sec{background:var(--sf);border:1px solid var(--bd);border-radius:4px;margin-bottom:16px;overflow:hidden}
.sec-hd{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:var(--sf2);border-bottom:1px solid var(--bd);font-size:12px;font-weight:700;color:var(--dim);letter-spacing:.2px}
.sec-hd::before{content:'// '}
.sec-hd>span:first-child{color:var(--dim)}
.sec-bd{padding:16px}
select,input[type=number],input[type=text]{background:var(--sf2);border:1px solid var(--bd);color:var(--dfc);padding:6px 9px;border-radius:3px;font-family:'Nanum Gothic Coding',monospace;font-size:13px}
select:focus,input:focus{outline:none;border-color:var(--keyword)}
.fg label{display:block;font-size:11px;color:var(--dim);margin-bottom:4px}
.fg label::before{content:'// '}
.fg select,.fg input{width:100%}
.cfg-lbl{font-size:12px;color:var(--keyword);font-weight:700;margin-bottom:8px}
.cfg-lbl::before{content:'let ';color:var(--keyword);font-weight:400}
.cfg-lbl::after{content:' =';color:var(--text)}
.btn-grp{display:flex;gap:4px;flex-wrap:wrap}
.btn-grp button{flex:1;min-width:64px;padding:7px 4px;background:var(--sf2);border:1px solid var(--bd);border-radius:3px;color:var(--text2);cursor:pointer;font-family:'Nanum Gothic Coding',monospace;font-size:13px;font-weight:400;transition:all .12s}
.btn-grp button::before{content:'"';color:var(--string);opacity:.7}
.btn-grp button::after{content:'"';color:var(--string);opacity:.7}
.btn-grp button:hover{border-color:var(--text2)}
.btn-grp button.active{background:rgba(86,156,214,.14);border-color:var(--keyword);color:var(--dfc)}
.btn-grp button.active::before,.btn-grp button.active::after{color:var(--dfc);opacity:1}
.btn-reset{background:none;border:1px solid var(--red);color:var(--red);padding:5px 12px;border-radius:3px;cursor:pointer;font-family:'Nanum Gothic Coding',monospace;font-size:13px;font-weight:700}
.btn-reset:hover{background:rgba(241,76,76,.1)}
.sp-opts{display:grid;grid-template-columns:1fr;gap:8px;margin-bottom:12px}
.sp-ocard{display:flex;align-items:center;gap:7px;padding:8px 10px;background:var(--bg);border:1px solid var(--bd);border-radius:3px}
.sp-onum{color:var(--gold);font-size:11px;font-weight:700;min-width:22px}
.sp-onum::before{content:'['}.sp-onum::after{content:']'}
.sp-ocard select{flex:1;font-size:12px}
.sp-oval{color:var(--num);font-size:11px;min-width:46px;text-align:right}
.sp-preset-grid{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:6px;margin-bottom:10px}
@media (max-width:520px){
  .sp-preset-grid{grid-template-columns:repeat(3,minmax(0,1fr))}
  .sp-preset-name,.sp-preset-desc{display:block;margin-left:0}
}
.acc-card{background:var(--bg);border:1px solid var(--bd);border-radius:3px;padding:8px 12px;margin-bottom:8px}
.acc-card-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.acc-search-wrap{position:relative;flex:1;min-width:140px}
.acc-search-input{width:100%;background:var(--sf2);border:1px solid var(--bd);color:var(--string);padding:6px 9px;border-radius:3px;font-family:'Nanum Gothic Coding',monospace;font-size:13px}
.acc-search-input:focus{outline:none;border-color:var(--keyword)}
.acc-search-input::placeholder{color:var(--dimmer)}
.acc-dropdown{position:absolute;top:100%;left:0;right:0;background:var(--sf2);border:1px solid var(--keyword);border-radius:3px;max-height:200px;overflow-y:auto;z-index:200;margin-top:2px;display:none}
.acc-dropdown.open{display:block}
.acc-drop-item{padding:6px 10px;font-size:13px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:8px;color:var(--string);font-family:'Nanum Gothic Coding',monospace}
.acc-drop-item:hover{background:rgba(86,156,214,.14)}
.acc-drop-item.focused{background:rgba(86,156,214,.22);outline:none}
.acc-drop-name{flex:1}
.btn-red{background:none;border:1px solid var(--red);color:var(--red);padding:3px 9px;border-radius:3px;cursor:pointer;font-family:'Nanum Gothic Coding',monospace;font-size:12px}
.btn-add{background:none;border:1px solid var(--keyword);color:var(--dfc);padding:5px 12px;border-radius:3px;cursor:pointer;font-family:'Nanum Gothic Coding',monospace;font-size:13px;font-weight:700}
.btn-add:hover{background:rgba(86,156,214,.1)}
.sp-preset-btn{background:var(--bg);border:1px solid var(--bd);border-radius:3px;padding:6px 8px;color:var(--text);cursor:pointer;font-family:'Nanum Gothic Coding',monospace;text-align:center;transition:all .12s;min-height:34px;white-space:nowrap}
.sp-preset-btn:hover{border-color:var(--keyword)}
.sp-preset-btn.active{border-color:var(--keyword);background:rgba(86,156,214,.14)}
.sp-preset-name{display:inline;font-size:12px;font-weight:700;color:var(--gold)}
.sp-preset-desc{display:inline;font-size:11px;color:var(--num);margin-left:5px}
.btn-sim{width:100%;padding:14px;background:var(--sf2);border:1px solid var(--keyword);border-radius:4px;color:var(--dfc);font-family:'Nanum Gothic Coding',monospace;font-size:15px;font-weight:700;cursor:pointer;margin:14px 0;letter-spacing:.2px;transition:background .12s;text-align:left}
.btn-sim:hover{background:rgba(86,156,214,.12)}
.btn-sim:active{transform:translateY(1px)}
.btn-sim .car{display:inline-block;width:8px;height:15px;background:var(--dfc);vertical-align:-2px;margin-left:2px}
@media (prefers-reduced-motion: no-preference){
  .btn-sim .car{animation:blink 1s steps(1) infinite}
}
@keyframes blink{50%{opacity:0}}
.res-wrap{overflow-x:auto}
.type-block{background:var(--sf);border:1px solid var(--bd);border-radius:4px;margin-bottom:10px;overflow:hidden}
.type-hd{width:100%;display:flex;align-items:center;gap:10px;padding:11px 14px;background:var(--sf2);border:none;color:var(--text);cursor:pointer;font-family:'Nanum Gothic Coding',monospace;font-size:13px;text-align:left}
.type-hd:hover{background:rgba(255,255,255,.03)}
.ty-caret{color:var(--keyword);font-size:11px;transition:transform .15s;flex-shrink:0}
.ty-caret.open{transform:rotate(90deg)}
.ty-name{color:var(--string);font-weight:700;flex-shrink:0}
.ty-name::before,.ty-name::after{content:'"';opacity:.6}
.ty-summary{color:var(--text2);font-size:12px;margin-left:auto;display:flex;align-items:center;gap:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.ty-bv{color:var(--num);font-weight:700;flex-shrink:0}
.ty-body{display:none;padding:10px}
.ty-body.open{display:block}
.res-card{background:var(--bg);border:1px solid var(--bd);border-radius:4px;padding:10px 12px;margin-bottom:8px}
.res-card:last-child{margin-bottom:0}
.res-card.rank1{border-color:var(--gold);background:rgba(220,220,170,.05)}
.res-card-hd{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.res-thumb{width:26px;height:26px;object-fit:contain;border:1px solid var(--bd);border-radius:3px;background:var(--sf2);flex-shrink:0}
.res-thumb-sm{width:16px;height:16px;object-fit:contain;border:1px solid var(--bd);border-radius:2px;background:var(--sf2);vertical-align:-3px;margin-right:3px}
.res-name{color:var(--string);font-weight:700;font-size:13px}
.res-name::before,.res-name::after{content:'"';opacity:.6}
.res-ench{color:var(--dim);font-size:11px;margin-left:auto}
.res-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.res-cell{min-width:0}
.res-cell label{display:block;font-size:10px;color:var(--dim);margin-bottom:2px}
.res-cell .v{font-size:13px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.res-cell.bv .v{color:var(--num);font-weight:700}
.res-cell.wide{grid-column:span 2}
.rk{color:var(--dimmer);font-size:12px}
.rk.rk1{color:var(--gold);font-weight:700}
.str{color:var(--string)}
.str::before,.str::after{content:'"';opacity:.6}
@media (max-width:600px){
  .type-hd{flex-wrap:wrap}
  .ty-summary{flex-basis:100%;margin-left:20px}
  .res-grid{grid-template-columns:repeat(2,1fr)}
  .res-cell.wide{grid-column:span 1}
}
.info-box{font-size:13px;line-height:2;color:var(--text2)}
.info-box::before{content:none}
</style>
</head>
<body>

<div class="hd">
  <div class="hd-dots"><span></span><span></span><span></span></div>
  <div class="hd-icon">🐉</div>
  <div><div class="hd-t">tank_calc.js</div><div class="hd-s">개인용 · 체력×방어 최고값 탐색</div></div>
</div>

<div class="ti">

  <div class="sec">
    <div class="sec-hd">⚙ 기본 설정</div>
    <div class="sec-bd">
      <div style="display:flex;flex-direction:column;gap:14px">
        <div>
          <div class="cfg-lbl">등급</div>
          <div class="btn-grp" id="grd-grp">
            <button onclick="setGrade('7.0')">7.0</button>
            <button onclick="setGrade('8.0')">8.0</button>
            <button class="active" onclick="setGrade('9.0')">9.0</button>
          </div>
        </div>
        <div>
          <div class="cfg-lbl">버프 (기본스탯 대비 %, 직접입력)</div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
            <div class="fg"><label>체력버프 %</label><input type="number" id="buf-hp" value="0" min="0" step="0.1" onchange="onBuf('hp',this.value)"></div>
            <div class="fg"><label>공격버프 %</label><input type="number" id="buf-atk" value="0" min="0" step="0.1" onchange="onBuf('atk',this.value)"></div>
            <div class="fg"><label>방어버프 %</label><input type="number" id="buf-def" value="0" min="0" step="0.1" onchange="onBuf('def',this.value)"></div>
          </div>
        </div>
        <div>
          <div class="cfg-lbl">장신구</div>
          <div class="btn-grp" id="acc-grp">
            <button class="active" onclick="setAccCat('회깃')">회깃(회피깃털)</button>
            <button onclick="setAccCat('어둠뿔')">어둠뿔</button>
            <button onclick="setAccCat('스텟장신구')">스텟장신구</button>
          </div>
        </div>
        <div>
          <div class="cfg-lbl">인첸트 수치 (%, 직접입력)</div>
          <input type="number" id="ench-pct" value="21" min="0" step="0.1" style="width:100%" onchange="setEnchPct(this.value)">
        </div>
        <div>
          <div class="cfg-lbl">인첸트 대상</div>
          <div class="btn-grp" id="ench-tgt-grp">
            <button class="active" onclick="setEnchTarget('auto')">자동탐색</button>
            <button onclick="setEnchTarget('hp')">체력 고정</button>
            <button onclick="setEnchTarget('def')">방어 고정</button>
          </div>
        </div>
        <div>
          <div class="cfg-lbl">젬 레벨</div>
          <div class="btn-grp" id="gem-grp">
            <button class="active" onclick="setGemLv(36)">36</button>
            <button onclick="setGemLv(37)">37</button>
          </div>
        </div>
        <div>
          <div class="cfg-lbl">펜던트 옵션 수 (옵션당 6% 고정)</div>
          <div class="btn-grp" id="pend-grp">
            <button onclick="setPendOpts(1)">1옵 (별의 펜던트)</button>
            <button class="active" onclick="setPendOpts(2)">2옵 (달의 펜던트)</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="sec" id="acc-sec" style="display:none">
    <div class="sec-hd">
      <span>💍 스텟장신구 (보유 목록)</span>
      <div style="display:flex;gap:6px">
        <button class="btn-add" onclick="addAcc()">+ 추가</button>
        <button class="btn-reset" onclick="resetAcc()">↺</button>
      </div>
    </div>
    <div class="sec-bd" id="acc-list"></div>
  </div>

  <div class="sec">
    <div class="sec-hd">
      <span>✨ 정령</span>
      <button class="btn-reset" onclick="resetSpirit()">↺</button>
    </div>
    <div class="sec-bd" id="sp-bd"></div>
  </div>

  <div class="sec">
    <div class="sec-hd">📌 고정값</div>
    <div class="sec-bd info-box">
      💎 젬: 레벨은 위에서 선택(36/37) · 5슬롯 체력/방어에만 배분 (자동 최적 탐색)<br>
      📚 컬렉션: 체 240 / 공 60 / 방 60 고정<br>
      🌙 펜던트: 옵션 6% 고정, 옵션 수(1옵/2옵)는 위에서 선택<br>
    </div>
  </div>

  <button class="btn-sim" onclick="runCalc()">▶ runCalc()<span class="car"></span></button>

  <div class="sec" id="res-sec" style="display:none">
    <div class="sec-hd">🏆 결과 — 타입별 체방 젤 높은셋팅</div>
    <div class="res-wrap"><div id="res-body"></div></div>
  </div>

</div>

<script>
// ================================================================
// 상수
// ================================================================
const SK={hp:'체',atk:'공',def:'방'};
const DTYPES=['체력형','공격형','방어형','체공형','체방형','공방형'];

const BASE={
  '7.0':{체력형:{hp:1252,atk:176,def:176},공격형:{hp:876,atk:285,def:161},방어형:{hp:788,atk:185,def:283},공방형:{hp:720,atk:242,def:243},체공형:{hp:1080,atk:262,def:133},체방형:{hp:1080,atk:133,def:262}},
  '8.0':{체력형:{hp:1332,atk:176,def:176},공격형:{hp:876,atk:305,def:161},방어형:{hp:788,atk:185,def:303},공방형:{hp:720,atk:252,def:253},체공형:{hp:1120,atk:272,def:133},체방형:{hp:1120,atk:133,def:272}},
  '9.0':{체력형:{hp:1412,atk:176,def:176},공격형:{hp:876,atk:325,def:161},방어형:{hp:788,atk:185,def:323},공방형:{hp:720,atk:262,def:263},체공형:{hp:1160,atk:282,def:133},체방형:{hp:1160,atk:133,def:282}},
};

const GEM={36:{hp:144,atk:36,def:36},37:{hp:148,atk:37,def:37}};

const SP_PLUS={hp:{1:216,2:240,3:264,4:480},atk:{1:54,2:60,3:66,4:120},def:{1:54,2:60,3:66,4:120}};
const SP_PCT={1:0.24,2:0.28,3:0.32,4:0.40};
const SP_BONUS={hp:40,atk:10,def:10};
const SP_PRESETS=[
  {id:'custom',name:'직접입력',types:['','','','']},
  {id:'last_plus',name:'막플',types:['%','%','%','+']},
  {id:'all_pct',name:'올퍼',types:['%','%','%','%']},
  {id:'one_four_plus',name:'14플',types:['+','%','%','+']},
  {id:'first_plus',name:'24플',types:['%','+','%','+']},
  {id:'first_only_plus',name:'1플',types:['+','%','%','%']}
];

// 장신구/펜던트 이미지 (기존 계산기와 동일한 저장소)
const TEM_BASE='https://raw.githubusercontent.com/yejoo0519/dogam/refs/heads/main/tem';
const ACC_IMG_MAP={
  '20':{'빛뿔':12,'바뿔':13,'악보':20,'황보':21,'여보':22,'대뿔':1433,'물뿔':1435,'불뿔':1437},
  '19':{'악보':1273,'황보':1274,'여보':1275,'바뿔':1276,'대뿔':1306,'물뿔':1308,'불뿔':1310},
  '18':{'빛뿔':1209,'악보':1205,'황보':1206,'여보':1207,'바뿔':1202,'대뿔':1247,'물뿔':1249,'불뿔':1251},
  '17':{'악보':1102,'황보':1103,'여보':1104,'바뿔':1105,'대뿔':1130,'물뿔':1132,'불뿔':1134},
  '16':{'악보':1046,'황보':1047,'여보':1048,'바뿔':1049,'대뿔':1130,'물뿔':1132,'불뿔':1134},
};
const accImg=(lv,name)=>{const n=ACC_IMG_MAP[String(lv)]?.[name];return n?`${TEM_BASE}/${n}.png`:'';};
const IMG_PEND={태양:`${TEM_BASE}/1337.png`,달:`${TEM_BASE}/1336.png`,별:`${TEM_BASE}/1335.png`};
const IMG_어둠뿔=`${TEM_BASE}/760.png`;
const IMG_회깃=`${TEM_BASE}/645.png`;

// 장신구 DB (기존 계산기의 ACC_DB)
const ACC_DB=[
  {n:'빛뿔 (크/체) 18',hp:0.08, atk:0,    def:0   , img:accImg(18,'빛뿔')},
  {n:'빛뿔 (크/공) 18',hp:0,    atk:0.08, def:0   , img:accImg(18,'빛뿔')},
  {n:'빛뿔 (크/방) 18',hp:0,    atk:0,    def:0.08, img:accImg(18,'빛뿔')},
  {n:'빛뿔 (크/체) 20',hp:0.1,  atk:0,    def:0   , img:accImg(20,'빛뿔')},
  {n:'빛뿔 (크/공) 20',hp:0,    atk:0.1,  def:0   , img:accImg(20,'빛뿔')},
  {n:'빛뿔 (크/방) 20',hp:0,    atk:0,    def:0.1 , img:accImg(20,'빛뿔')},

  {n:'악몽 수호자의 보주 (악보) 16',hp:0.16, atk:0,    def:0   , img:accImg(16,'악보')},
  {n:'황혼 수호자의 보주 (황보) 16',hp:0,    atk:0.16, def:0   , img:accImg(16,'황보')},
  {n:'여명 수호자의 보주 (여보) 16',hp:0,    atk:0,    def:0.16, img:accImg(16,'여보')},

  accCards:[]

function doLoad(){
  try{
    const raw=localStorage.getItem(SAVE_KEY);
    if(raw){
      const p=JSON.parse(raw);
      if(p.opts||p.bonus!==undefined){ // 구버전 호환 (spirit만 저장돼있던 경우)
        S.spirit=p;
      }else{
        S.spirit=p.spirit||S.spirit;
        S.accCards=p.accCards||[];
      }
    }
  }catch(e){}
}
function doSave(){
  try{localStorage.setItem(SAVE_KEY,JSON.stringify(S));}catch(e){}
}

function spPresetLabel(type){return type==='%'?'%':type==='+'?'+':'-';}
function isSpiritPresetActive(preset){
  return preset.types.every((type,i)=>(S.spirit.opts[i]||{}).type===type);
}
function applySpiritPreset(id){
  const preset=SP_PRESETS.find(p=>p.id===id);
  if(!preset)return;
  S.spirit.opts=preset.types.map((type,i)=>({stat:S.spirit.opts[i]?.stat||'',type}));
  renderSpirit();doSave();
}
function fmtSpVal(n,stat,type){
  if(!stat||!type)return'';
  return type==='+'?`<b>+${SP_PLUS[stat][n]}</b>`:`<b>+${(SP_PCT[n]*100).toFixed(0)}%</b>`;
}
function onSpOpt(idx,field,val){
  S.spirit.opts[idx][field]=val;
  renderSpirit();doSave();
}
function onSpBonus(val){
  S.spirit.bonus=val;
  renderSpirit();doSave();
}
function resetSpirit(){
  if(!confirm('정령 입력값이 초기화됩니다.'))return;
  S.spirit={opts:[{stat:'',type:''},{stat:'',type:''},{stat:'',type:''},{stat:'',type:''}],bonus:''};
  renderSpirit();doSave();
}
function renderSpirit(){
  const el=document.getElementById('sp-bd');
  if(!el)return;
  const sp=S.spirit;
  const presets=SP_PRESETS.map(p=>{
    const desc=p.types.map(spPresetLabel).join('');
    return `<button class="sp-preset-btn ${isSpiritPresetActive(p)?'active':''}" onclick="applySpiritPreset('${p.id}')">
      <span class="sp-preset-name">${p.name}</span>
      <span class="sp-preset-desc">${desc}</span>
    </button>`;
  }).join('');
  let opts='';
  for(let i=1;i<=4;i++){
    const o=sp.opts[i-1]||{stat:'',type:''};
    const v=(o.stat&&o.type)?fmtSpVal(i,o.stat,o.type):'';
    opts+=`<div class="sp-ocard">
      <span class="sp-onum">${i}옵</span>
      <select onchange="onSpOpt(${i-1},'stat',this.value)">
        <option value=""    ${!o.stat?'selected':''}>-</option>
        <option value="hp"  ${o.stat==='hp'?'selected':''}>체력</option>
        <option value="atk" ${o.stat==='atk'?'selected':''}>공격</option>
        <option value="def" ${o.stat==='def'?'selected':''}>방어</option>
      </select>
      <select onchange="onSpOpt(${i-1},'type',this.value)">
        <option value=""  ${!o.type?'selected':''}>-</option>
        <option value="+" ${o.type==='+'?'selected':''}>+스탯</option>
        <option value="%" ${o.type==='%'?'selected':''}>%스탯</option>
      </select>
      <span class="sp-oval">${v}</span>
    </div>`;
  }
  el.innerHTML=`
    <div class="sp-preset-grid">${presets}</div>
    <div class="sp-opts">${opts}</div>
    <div class="fg"><label>부가옵</label>
      <select onchange="onSpBonus(this.value)">
        <option value=""    ${!sp.bonus?'selected':''}>없음</option>
        <option value="hp"  ${sp.bonus==='hp'?'selected':''}>체력 (+40)</option>
        <option value="atk" ${sp.bonus==='atk'?'selected':''}>공격 (+10)</option>
        <option value="def" ${sp.bonus==='def'?'selected':''}>방어 (+10)</option>
      </select>
    </div>`;
}
function procSpirit(){
  const sp=S.spirit;
  const plus={hp:0,atk:0,def:0},pct={hp:0,atk:0,def:0},bonus={hp:0,atk:0,def:0};
  for(let i=0;i<4;i++){
    const o=sp.opts[i];
    if(!o||!o.stat||!o.type)continue;
    if(o.type==='+')plus[o.stat]+=SP_PLUS[o.stat][i+1];
    else if(o.type==='%')pct[o.stat]+=SP_PCT[i+1];
  }
  if(sp.bonus&&SP_BONUS[sp.bonus])bonus[sp.bonus]=SP_BONUS[sp.bonus];
  return{plus,pct,bonus};
}

function fmtAccSt(a){
  if(!a)return'';
  const p=[];
  if(a.hp>0)p.push(`<span style="color:var(--hpc)">체${(a.hp*100).toFixed(0)}%</span>`);
  if(a.atk>0)p.push(`<span style="color:var(--atc)">공${(a.atk*100).toFixed(0)}%</span>`);
  if(a.def>0)p.push(`<span style="color:var(--dfc)">방${(a.def*100).toFixed(0)}%</span>`);
  return p.length?p.join(' '):'<span style="color:var(--dimmer)">-</span>';
}
function applyEncColor(sel){
  const v=sel.value;
  sel.style.color=v==='hp'?'var(--gold)':v==='atk'?'var(--red)':v==='def'?'var(--blue)':'var(--text)';
}
function renderAcc(){
  const list=document.getElementById('acc-list');
  if(!list)return;
  if(!S.accCards.length){
    list.innerHTML='<div style="color:var(--dimmer);font-size:13px">보유 장신구 없음. + 추가 버튼으로 등록해줘.</div>';
    return;
  }
  let html='';
  S.accCards.forEach((card,ci)=>{
    const a=ACC_DB.find(x=>x.n===card.name);
    const stHtml=a?fmtAccSt(a):'<span style="color:var(--dimmer)">-</span>';
    const imgHtml=a&&a.img?`<img src="${a.img}" style="width:32px;height:32px;object-fit:contain;flex-shrink:0;border:1px solid var(--bd);border-radius:3px;background:var(--bg)">`:'<div style="width:32px;height:32px;flex-shrink:0;border:1px solid var(--bd);border-radius:3px;background:var(--bg)"></div>';
    html+=`<div class="acc-card">
      <div class="acc-card-row">
        ${imgHtml}
        <div class="acc-search-wrap" id="acc-wrap-${ci}">
          <input class="acc-search-input" id="acc-inp-${ci}" value="${card.name||''}" placeholder="장신구 검색..."
            oninput="filterAccDrop(${ci},this.value)"
            onfocus="openAccDrop(${ci})"
            onblur="setTimeout(()=>closeAccDrop(${ci},this),150)"
            onkeydown="accNavKey(event,${ci})">
          <div class="acc-dropdown" id="acc-drop-${ci}"></div>
        </div>
        <span style="font-size:11px;min-width:80px">${stHtml}</span>
        <span style="font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.3px;font-weight:700;flex-shrink:0">인챈트</span>
        <select style="font-size:12px" onchange="onAccEnc(${ci},this.value);applyEncColor(this)">
          <option value="none" ${card.enchant==='none'?'selected':''}>인챈트 상관X</option>
          <option value="hp"   ${card.enchant==='hp'?'selected':''}>체 +${simEnchPct}%</option>
          <option value="atk"  ${card.enchant==='atk'?'selected':''}>공 +${simEnchPct}%</option>
          <option value="def"  ${card.enchant==='def'?'selected':''}>방 +${simEnchPct}%</option>
        </select>
        <button class="btn-red" onclick="delAcc(${ci})">삭제</button>
      </div>
    </div>`;
  });
  list.innerHTML=html;
  document.querySelectorAll('#acc-list select').forEach(sel=>applyEncColor(sel));
}
function openAccDrop(ci){
  filterAccDrop(ci, document.getElementById('acc-inp-'+ci).value);
  const drop=document.getElementById('acc-drop-'+ci);
  drop.classList.add('open');
  const sec=drop.closest('.sec');
  if(sec)sec.style.overflow='visible';
}
function closeAccDrop(ci,el){
  const drop=document.getElementById('acc-drop-'+ci);
  if(!drop)return;
  drop.classList.remove('open');
  const sec=drop.closest('.sec');
  if(sec)sec.style.overflow='';
  if(el){
    const valid=ACC_DB.some(a=>a.n===el.value);
    if(!valid){
      S.accCards[ci].name='';
      S.accCards[ci].enchant='none';
      el.value='';
      doSave();
    }
  }
}
function accNavKey(e,ci){
  const drop=document.getElementById('acc-drop-'+ci);
  if(!drop||!drop.classList.contains('open'))return;
  const items=[...drop.querySelectorAll('.acc-drop-item')];
  if(!items.length)return;
  const cur=drop.querySelector('.acc-drop-item.focused');
  let idx=items.indexOf(cur);
  if(e.key==='ArrowDown'){
    e.preventDefault();
    idx=Math.min(idx+1,items.length-1);
    items.forEach(el=>el.classList.remove('focused'));
    items[idx].classList.add('focused');
    items[idx].scrollIntoView({block:'nearest'});
  }else if(e.key==='ArrowUp'){
    e.preventDefault();
    idx=Math.max(idx-1,0);
    items.forEach(el=>el.classList.remove('focused'));
    items[idx].classList.add('focused');
    items[idx].scrollIntoView({block:'nearest'});
  }else if(e.key==='Enter'){
    e.preventDefault();
    if(cur)cur.dispatchEvent(new MouseEvent('mousedown'));
  }else if(e.key==='Escape'){
    closeAccDrop(ci);
  }
}
function filterAccDrop(ci,q){
  const drop=document.getElementById('acc-drop-'+ci);
  if(!drop)return;
  const kw=q.toLowerCase().trim();
  let filtered=kw?ACC_DB.filter(a=>a.n.toLowerCase().includes(kw)):ACC_DB;
  drop.innerHTML=filtered.slice(0,30).map(a=>
    `<div class="acc-drop-item" onmousedown="selectAcc(${ci},'${a.n.replace(/'/g,"\\'")}')">
      <span class="acc-drop-name">${a.n}</span>
    </div>`
  ).join('');
  drop.classList.add('open');
}
function selectAcc(ci,name){
  S.accCards[ci].name=name;
  const inp=document.getElementById('acc-inp-'+ci);
  if(inp)inp.value=name;
  closeAccDrop(ci);
  renderAcc();doSave();
}
function addAcc(){
  S.accCards.unshift({name:'',enchant:'none'});
  renderAcc();doSave();
}
function delAcc(ci){
  S.accCards.splice(ci,1);
  renderAcc();doSave();
}
function resetAcc(){
  if(!confirm('보유 장신구 목록이 전부 초기화됩니다.'))return;
  S.accCards=[];
  renderAcc();doSave();
}
function onAccEnc(ci,enc){
  S.accCards[ci].enchant=enc;
  doSave();
}

function calcStat(B,G,P,AP,SP,PP,SL,SB,C,BU){
  const a=Math.floor((B+G+P)*(1+AP));
  const b=Math.floor(a*(1+SP));
  const c=Math.floor(b*(1+PP));
  const d=Math.floor(Math.floor(SL*(1+SP))*(1+PP));
  const e=Math.floor(SB*(1+PP));
  return c+d+e+C+BU;
}

// ================================================================
// 장신구 후보 (어둠뿔 / 회깃 / 체+방 전용 장신구)
// ================================================================
function buildAccCandidates(){
  const list=[];
  if(simAccCat==='어둠뿔'){
    // 자체 스탯: 회피+체력5% 또는 회피+방어5% (고정, 둘 중 하나) + 별도 인첸트(21%, hp/atk/def 자유)
    const baseVariants=[
      {label:'체5%',stat:'hp'},
      {label:'방5%',stat:'def'},
    ];
    baseVariants.forEach(bvv=>{
      getEnchList().forEach(enc=>{
        list.push({
          name:`어둠뿔 (자체:${bvv.label})`,
          hp:(bvv.stat==='hp'?0.05:0)+(enc==='hp'?simEnchPct/100:0),
          atk:(enc==='atk'?simEnchPct/100:0),
          def:(bvv.stat==='def'?0.05:0)+(enc==='def'?simEnchPct/100:0),
          ench:enc,
          img:IMG_어둠뿔
        });
      });
    });
  }else if(simAccCat==='회깃'){
    // 자체 스탯 없음(회피만 올려줌) + 인첸트(+21%)만 계산
    getEnchList().forEach(enc=>{
      list.push({
        name:'회깃14',
        hp:enc==='hp'?simEnchPct/100:0, atk:enc==='atk'?simEnchPct/100:0, def:enc==='def'?simEnchPct/100:0,
        ench:enc,
        img:IMG_회깃
      });
    });
  }else{
    // 스텟장신구: 내가 등록한 보유 장신구 목록에서 선택
    const owned=(S.accCards||[]).map(c=>({...ACC_DB.find(a=>a.n===c.name),card:c})).filter(a=>a.n);
    if(!owned.length){
      alert('스텟장신구 목록에서 장신구를 1개 이상 추가해줘.');
      return[];
    }
    owned.forEach(a=>{
      const encs=a.card.enchant==='none'?getEnchList():[a.card.enchant];
      encs.forEach(enc=>{
        list.push({
          name:a.n,
          hp:a.hp+(enc==='hp'?simEnchPct/100:0),
          atk:a.atk+(enc==='atk'?simEnchPct/100:0),
          def:a.def+(enc==='def'?simEnchPct/100:0),
          ench:enc
        });
      });
    });
  }
  return list;
}

// ================================================================
// 계산 실행
// ================================================================
function runCalc(){
  const {plus:sP,pct:sPct,bonus:sB}=procSpirit();
  const coll={hp:240,atk:60,def:60};
  const accList=buildAccCandidates();
  if(!accList.length)return;
  // 젬 5슬롯: 체력/방어에만 배분
  const gemSplits=[];
  for(let n=0;n<=5;n++)gemSplits.push({nHp:n,nDef:5-n});
  // 펜던트(옵션 6% 고정) - 옵션 수에 따라 조합 결정
  const pendCombos = simPendOpts===1 ? [
    {label:'체(1옵)',pH:0.06,pD:0},
    {label:'방(1옵)',pH:0,pD:0.06},
  ] : [
    {label:'체+체',pH:0.06*2,pD:0},
    {label:'체+방',pH:0.06,pD:0.06},
    {label:'방+방',pH:0,pD:0.06*2},
  ];

  const typeResults=[];
  for(const dt of DTYPES){
    const bs=BASE[simGrade][dt];
    const bh=bs.hp,ba=bs.atk,bd=bs.def;
    const bufH=Math.floor(bh*buf.hp/100);
    const bufA=Math.floor(ba*buf.atk/100);
    const bufD=Math.floor(bd*buf.def/100);

    const all=[];
    for(const acc of accList){
      for(const gs of gemSplits){
        const g=GEM[simGemLv];
        const gH=gs.nHp*g.hp, gD=gs.nDef*g.def;
        for(const pend of pendCombos){
          const fH=calcStat(bh,gH,24,acc.hp,sPct.hp,pend.pH,sP.hp,sB.hp,coll.hp,bufH);
          const fA=calcStat(ba,0, 6,acc.atk,sPct.atk,0,      sP.atk,sB.atk,coll.atk,bufA);
          const fD=calcStat(bd,gD,6,acc.def,sPct.def,pend.pD,sP.def,sB.def,coll.def,bufD);
          const bv=fH*fD;
          const ebv=fH+fD*4;
          all.push({acc,gs,pend,fH,fA,fD,bv,ebv});
        }
      }
    }
    all.sort((a,b)=>b.bv-a.bv);
    typeResults.push({dt,top5:all.slice(0,5)});
  }
  typeResults.sort((a,b)=>b.top5[0].bv-a.top5[0].bv);
  renderResult(typeResults);
}

function accImgByName(acc){
  if(acc.img)return acc.img;
  const a=ACC_DB.find(x=>x.n===acc.name);
  return a&&a.img?a.img:'';
}
function pendImg(){
  return simPendOpts===1?IMG_PEND.별:IMG_PEND.달;
}
function imgTag(src,cls){
  cls=cls||'res-thumb';
  return src?`<img src="${src}" class="${cls}" onerror="this.style.visibility='hidden'">`:'';
}
function renderResult(typeResults){
  const el=document.getElementById('res-body');
  let html='';
  typeResults.forEach(({dt,top5})=>{
    const top=top5[0];
    html+=`<div class="type-block">
      <button class="type-hd" onclick="toggleType(this)">
        <span class="ty-caret">▶</span>
        <span class="ty-name">${dt}</span>
        <span class="ty-summary">${imgTag(accImgByName(top.acc),'res-thumb-sm')}${top.acc.name} · 체${top.fH.toLocaleString('ko-KR')} / 방${top.fD.toLocaleString('ko-KR')} · 비밸 <span class="ty-bv">${top.bv.toLocaleString('ko-KR')}</span></span>
      </button>
      <div class="ty-body">`;
    top5.forEach((r,i)=>{
      const rank=i===0?'<span class="rk rk1">#1</span>':`<span class="rk">#${i+1}</span>`;
      html+=`<div class="res-card ${i===0?'rank1':''}">
        <div class="res-card-hd">
          ${rank}
          ${imgTag(accImgByName(r.acc))}
          <span class="res-name">${r.acc.name}</span>
          <span class="res-ench">인첸트:${SK[r.acc.ench]}</span>
        </div>
        <div class="res-grid">
          <div class="res-cell"><label>젬(체/방)</label><span class="v">${r.gs.nHp} / ${r.gs.nDef}</span></div>
          <div class="res-cell"><label>펜던트</label><span class="v str">${imgTag(pendImg(),'res-thumb-sm')}${r.pend.label}</span></div>
          <div class="res-cell wide"><label>체 / 공 / 방</label><span class="v"><span style="color:var(--hpc)">${r.fH.toLocaleString('ko-KR')}</span> / <span style="color:var(--atc)">${r.fA.toLocaleString('ko-KR')}</span> / <span style="color:var(--dfc)">${r.fD.toLocaleString('ko-KR')}</span></span></div>
          <div class="res-cell bv"><label>체×방</label><span class="v">${r.bv.toLocaleString('ko-KR')}</span></div>
          <div class="res-cell bv"><label>체+방×4</label><span class="v">${r.ebv.toLocaleString('ko-KR')}</span></div>
        </div>
      </div>`;
    });
    html+='</div></div>';
  });
  el.innerHTML=html;
  document.getElementById('res-sec').style.display='';
  document.getElementById('res-sec').scrollIntoView({behavior:'smooth',block:'start'});
}
function toggleType(btn){
  const body=btn.nextElementSibling;
  const caret=btn.querySelector('.ty-caret');
  const open=body.classList.toggle('open');
  caret.classList.toggle('open',open);
}

// ================================================================
// 초기화
// ================================================================
function init(){
  doLoad();
  renderSpirit();
  renderAcc();
}
document.addEventListener('DOMContentLoaded',init);
</script>
